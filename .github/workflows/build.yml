name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run make -- --arch ${{ matrix.arch }}

      - name: Rename artifact
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          DEST="spark-desktop-${PLATFORM}-${ARCH}-${VERSION}.zip"
          FOUND=0
          # electron-forge make outputs to out/make/zip/<platform>/<arch>/
          for f in out/make/zip/"${PLATFORM}"/"${ARCH}"/*.zip; do
            if [[ -f "$f" ]]; then
              cp "$f" "$DEST"
              echo "Created artifact: $DEST"
              FOUND=1
            fi
          done
          if [[ "$FOUND" -eq 0 ]]; then
            echo "Error: no ZIP artifact found in out/make/zip/${PLATFORM}/${ARCH}/"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}-${{ matrix.arch }}
          path: spark-desktop-${{ matrix.platform }}-${{ matrix.arch }}-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: spark-desktop-*.zip
